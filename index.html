<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nota-Tecnica - CDF</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f9;
}

header {
  background: linear-gradient(90deg, #0d6efd, #20c997);
  color: white;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.tabs {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.tab {
  padding: 10px 20px;
  background: #ddd;
  cursor: pointer;
  border-radius: 6px;
}

.tab.active {
  background: #0d6efd;
  color: white;
}

.container {
  padding: 15px;
}

input, select, button {
  padding: 8px;
  margin: 5px;
}

button {
  cursor: pointer;
}

.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

.table th, .table td {
  border: 1px solid #ccc;
  padding: 6px;
}
</style>
</head>

<body>

<header>Nota-Tecnica - CDF</header>

<div class="tabs">
  <div class="tab active" onclick="trocar('consulta')">Consultar Escola</div>
  <div class="tab" onclick="trocar('valor')">Gerar Valor</div>
  <div class="tab">Relatório</div>
</div>

<div class="container">

<!-- CONSULTA -->
<div id="consulta">
  <select id="campo">
    <option>NTE</option>
    <option>MUNICIPIO</option>
    <option>ESCOLA</option>
    <option>ESTADO</option>
  </select>

  <input id="valorBusca" placeholder="Digite..." />
  <button onclick="buscar()">Buscar</button>

  <table class="table">
    <thead>
      <tr>
        <th><input type="checkbox" onclick="marcarTodos(this)"></th>
        <th>NTE</th>
        <th>Município</th>
        <th>Cod SEC</th>
        <th>Cod INEP</th>
        <th>Escola</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>

  <button onclick="enviar()">Enviar</button>
</div>

<!-- GERAR VALOR -->
<div id="valor" style="display:none;">
  <button onclick="faed()">Faed Manutenção</button>
  <button onclick="alimentacao()">Alimentação</button>

  <table class="table" id="resultado"></table>
</div>

</div>

<script>

// 🔗 COLE AQUI OS LINKS CSV
const URL_ESCOLAS = "COLE_AQUI";
const URL_FAED = "COLE_AQUI";
const URL_ALIM = "COLE_AQUI";

let escolas = [];
let selecionados = [];
let faedData = [];
let alimData = [];

function csvJSON(csv) {
  const linhas = csv.split("\n");
  return linhas.map(l => l.split(","));
}

// carregar tudo ao abrir
window.onload = async () => {
  escolas = await fetch(URL_ESCOLAS).then(r => r.text()).then(csvJSON);
  faedData = await fetch(URL_FAED).then(r => r.text()).then(csvJSON);
  alimData = await fetch(URL_ALIM).then(r => r.text()).then(csvJSON);
};

function trocar(t) {
  document.getElementById("consulta").style.display = t === "consulta" ? "block" : "none";
  document.getElementById("valor").style.display = t === "valor" ? "block" : "none";
}

function buscar() {
  const campo = document.getElementById("campo").value;
  const valor = document.getElementById("valorBusca").value.toUpperCase();

  let html = "";

  escolas.forEach((l, i) => {
    if (i === 0) return;

    let ok = false;

    if (campo === "NTE" && l[1] == valor) ok = true;
    if (campo === "MUNICIPIO" && l[2].includes(valor)) ok = true;
    if (campo === "ESCOLA" && l[6].includes(valor)) ok = true;
    if (campo === "ESTADO") ok = true;

    if (ok) {
      const obj = {
        nte: l[1],
        municipio: l[2],
        codSec: l[3],
        codInep: l[5],
        escola: l[6]
      };

      html += `
      <tr>
        <td><input type="checkbox" data='${JSON.stringify(obj)}'></td>
        <td>${obj.nte}</td>
        <td>${obj.municipio}</td>
        <td>${obj.codSec}</td>
        <td>${obj.codInep}</td>
        <td>${obj.escola}</td>
      </tr>`;
    }
  });

  document.getElementById("lista").innerHTML = html;
}

function marcarTodos(c) {
  document.querySelectorAll("#lista input").forEach(x => x.checked = c.checked);
}

function enviar() {
  selecionados = [];
  document.querySelectorAll("#lista input:checked").forEach(x => {
    selecionados.push(JSON.parse(x.getAttribute("data")));
  });
}

function faed() {
  let html = "<tr><th>NTE</th><th>Município</th><th>Valor</th></tr>";

  selecionados.forEach(e => {
    let valor = 0;

    faedData.forEach(l => {
      if (l[2] == e.codSec) valor = l[4];
    });

    html += `<tr>
      <td>${e.nte}</td>
      <td>${e.municipio}</td>
      <td>${valor}</td>
    </tr>`;
  });

  document.getElementById("resultado").innerHTML = html;
}

function alimentacao() {
  let html = "<tr><th>NTE</th><th>Município</th><th>Federal</th><th>Estadual</th></tr>";

  selecionados.forEach(e => {
    let federal = 0, estadual = 0;

    alimData.forEach(l => {
      if (l[2] == e.codSec) {
        federal = l[3];
        estadual = l[4];
      }
    });

    html += `<tr>
      <td>${e.nte}</td>
      <td>${e.municipio}</td>
      <td>${federal}</td>
      <td>${estadual}</td>
    </tr>`;
  });

  document.getElementById("resultado").innerHTML = html;
}

</script>

</body>
</html>
