<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nota Técnica - CDF</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

header {
  background: linear-gradient(90deg,#0d6efd,#20c997);
  color:white; padding:15px; font-size:22px;
}

.tabs { display:flex; background:#103450; }
.tab { padding:10px 20px; color:#cbd5e1; cursor:pointer; }
.tab.active { background:#0d6efd; color:white; }

.container { padding:15px; }

input,select,button { padding:8px; margin:5px; }
button { cursor:pointer; }

.table {
  width:100%; border-collapse:collapse; margin-top:10px;
}
.table th,.table td {
  border:1px solid #ccc; padding:6px; text-align:center;
}
.table th { background:#0d6efd; color:white; }

</style>
</head>

<body>

<header>Nota Técnica - CDF</header>

<div class="tabs">
  <div class="tab active" onclick="trocar('consulta',event)">Consulta</div>
  <div class="tab" onclick="trocar('gerar',event)">Gerar Valor</div>
</div>

<div class="container">

<!-- CONSULTA -->
<div id="consulta">
  <select id="tipo">
    <option>NTE</option>
    <option>MUNICIPIO</option>
    <option>ESCOLA</option>
    <option>INEP</option>
  </select>

  <input id="busca">
  <button onclick="pesquisar()">Buscar</button>
  <button onclick="carregar()">Carregar</button>

  <table class="table">
    <thead>
      <tr>
        <th><input type="checkbox" onclick="marcarTodos(this)"></th>
        <th>NTE</th><th>Município</th><th>SEC</th><th>INEP</th><th>Escola</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>

  <button onclick="enviar()">Enviar</button>
</div>

<!-- GERAR -->
<div id="gerar" style="display:none;">

  <button onclick="buscarFaed()">Faed Manutenção</button>
  <button onclick="buscarAlimentacao()">Alimentação</button>

  <table class="table" id="tabelaGerar"></table>

</div>

</div>

<script>

const ID = "1bxT0HKmzmwBCohuwRUCexV_scB828Mjmr8aGt0ulY1k";

let dados=[], selecionados=[];
let faed=[], alim=[];

function url(sheet){
  return `https://docs.google.com/spreadsheets/d/${ID}/gviz/tq?tqx=out:csv&sheet=${sheet}`;
}

// carregar escolas
async function carregar(){
  const csv = await fetch(url("Escolas_ativas")).then(r=>r.text());
  dados = parse(csv);
  alert("Carregado: "+dados.length);
}

// parser
function parse(csv){
  return csv.split("\n").slice(1).map(l=>{
    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    return {
      nte:c[1], municipio:c[2],
      codSec:c[3], codInep:c[5], escola:c[6]
    };
  });
}

// pesquisar
function pesquisar(){
  const t = tipo.value;
  const v = busca.value.toUpperCase();

  let r=[];

  if(t==="NTE") r=dados.filter(x=>x.nte==v);
  if(t==="MUNICIPIO") r=dados.filter(x=>x.municipio.includes(v));
  if(t==="ESCOLA") r=dados.filter(x=>x.codSec==v);
  if(t==="INEP") r=dados.filter(x=>x.codInep==v);

  render(r);
}

// render lista
function render(lista){
  let h="";
  lista.forEach(e=>{
    h+=`<tr>
      <td><input type="checkbox" data='${JSON.stringify(e)}'></td>
      <td>${e.nte}</td><td>${e.municipio}</td>
      <td>${e.codSec}</td><td>${e.codInep}</td><td>${e.escola}</td>
    </tr>`;
  });
  listaHTML.innerHTML=h;
}

// marcar todos
function marcarTodos(c){
  document.querySelectorAll("#lista input").forEach(x=>x.checked=c.checked);
}

// enviar
function enviar(){
  selecionados=[];
  document.querySelectorAll("#lista input:checked").forEach(x=>{
    selecionados.push(JSON.parse(x.dataset));
  });

  renderGerar();
  trocar("gerar");
}

// render base
function renderGerar(){
  let h=`<tr>
    <th>NTE</th><th>Município</th><th>SEC</th><th>INEP</th><th>Escola</th>
    <th>FAED</th><th>Federal</th><th>Estadual</th>
  </tr>`;

  selecionados.forEach(e=>{
    h+=`<tr>
      <td>${e.nte}</td>
      <td>${e.municipio}</td>
      <td>${e.codSec}</td>
      <td>${e.codInep}</td>
      <td>${e.escola}</td>
      <td>${e.faed||0}</td>
      <td>${e.fed||0}</td>
      <td>${e.est||0}</td>
    </tr>`;
  });

  tabelaGerar.innerHTML=h;
}

// buscar FAED
async function buscarFaed(){
  const csv = await fetch(url("BBPag2023")).then(r=>r.text());
  faed = parse(csv);

  selecionados.forEach(e=>{
    const achou = faed.find(f=>f.codSec==e.codSec);
    e.faed = achou ? achou.codInep : 0;
  });

  renderGerar();
}

// buscar alimentação
async function buscarAlimentacao(){
  const csv = await fetch(url("dados_2023")).then(r=>r.text());
  alim = parse(csv);

  selecionados.forEach(e=>{
    const a = alim.find(x=>x.codSec==e.codSec);
    if(a){
      e.fed = a.codInep;
      e.est = a.escola;
    }
  });

  renderGerar();
}

// trocar aba
function trocar(t,ev){
  consulta.style.display = t==="consulta"?"block":"none";
  gerar.style.display = t==="gerar"?"block":"none";

  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  if(ev) ev.target.classList.add("active");
}

</script>

</body>
</html>
