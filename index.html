<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nota Técnica - CDF</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f9;
}

header {
  background: linear-gradient(90deg, #0d6efd, #20c997);
  color: white;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.tabs {
  display: flex;
  background: #103450;
}

.tab {
  padding: 10px 20px;
  cursor: pointer;
  color: #cbd5e1;
}

.tab.active {
  background: #0d6efd;
  color: white;
}

.container {
  padding: 15px;
}

input, select, button {
  padding: 8px;
  margin: 5px;
}

button {
  cursor: pointer;
}

.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

.table th, .table td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

.table th {
  background: #0d6efd;
  color: white;
}

tr.selected {
  background: #e6f4ff;
}

</style>
</head>

<body>

<header>Nota Técnica - CDF</header>

<div class="tabs">
  <div class="tab active" onclick="trocar('consulta')">Consultar Escola</div>
  <div class="tab" onclick="trocar('gerar')">Gerar Valor</div>
  <div class="tab">Relatório</div>
</div>

<div class="container">

<!-- CONSULTA -->
<div id="consulta">
  <select id="tipo">
    <option>NTE</option>
    <option>MUNICIPIO</option>
    <option>ESCOLA</option>
    <option>INEP</option>
  </select>

  <input id="busca" placeholder="Digite..." />
  <button onclick="pesquisar()">Buscar</button>
  <button onclick="carregar()">Carregar Dados</button>

  <table class="table">
    <thead>
      <tr>
        <th><input type="checkbox" onclick="marcarTodos(this)"></th>
        <th>NTE</th>
        <th>Município</th>
        <th>Cod SEC</th>
        <th>Cod INEP</th>
        <th>Escola</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>

  <button onclick="enviar()">Enviar para Gerar Valor</button>
</div>

<!-- GERAR -->
<div id="gerar" style="display:none;">
  <table class="table" id="tabelaGerar"></table>
</div>

</div>

<script>

const ID = "1bxT0HKmzmwBCohuwRUCexV_scB828Mjmr8aGt0ulY1k";

let dados = [];
let selecionados = [];

function url(sheet){
  return `https://docs.google.com/spreadsheets/d/${ID}/gviz/tq?tqx=out:csv&sheet=${sheet}`;
}

// carregar dados
async function carregar(){
  const csv = await fetch(url("Escolas_ativas")).then(r=>r.text());
  dados = parseCSV(csv);
  alert("Dados carregados: " + dados.length);
}

// parser CSV robusto
function parseCSV(csv){
  return csv.split("\n").slice(1).map(l=>{
    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    return {
      nte: (c[1]||"").replace(/"/g,""),
      municipio: (c[2]||"").replace(/"/g,""),
      codSec: (c[3]||"").replace(/"/g,""),
      codInep: (c[5]||"").replace(/"/g,""),
      escola: (c[6]||"").replace(/"/g,"")
    };
  });
}

// pesquisa
function pesquisar(){
  const tipo = document.getElementById("tipo").value;
  const valor = document.getElementById("busca").value.toUpperCase();

  let res = [];

  if(tipo==="NTE") res = dados.filter(x=>x.nte==valor);
  if(tipo==="MUNICIPIO") res = dados.filter(x=>x.municipio.includes(valor));
  if(tipo==="ESCOLA") res = dados.filter(x=>x.codSec==valor);
  if(tipo==="INEP") res = dados.filter(x=>x.codInep==valor);

  render(res);
}

// render tabela
function render(lista){
  let html = "";

  lista.forEach(e=>{
    html += `
    <tr>
      <td><input type="checkbox" data='${JSON.stringify(e)}'></td>
      <td>${e.nte}</td>
      <td>${e.municipio}</td>
      <td>${e.codSec}</td>
      <td>${e.codInep}</td>
      <td>${e.escola}</td>
    </tr>`;
  });

  document.getElementById("lista").innerHTML = html;
}

// marcar todos
function marcarTodos(c){
  document.querySelectorAll("#lista input").forEach(x=>x.checked=c.checked);
}

// enviar seleção
function enviar(){
  selecionados = [];

  document.querySelectorAll("#lista input:checked").forEach(x=>{
    selecionados.push(JSON.parse(x.getAttribute("data")));
  });

  renderGerar();
  trocar("gerar");
}

// gerar tabela
function renderGerar(){
  let html = `
  <tr>
    <th>NTE</th>
    <th>Município</th>
    <th>Cod SEC</th>
    <th>Cod INEP</th>
    <th>Escola</th>
  </tr>`;

  selecionados.forEach(e=>{
    html += `
    <tr>
      <td>${e.nte}</td>
      <td>${e.municipio}</td>
      <td>${e.codSec}</td>
      <td>${e.codInep}</td>
      <td>${e.escola}</td>
    </tr>`;
  });

  document.getElementById("tabelaGerar").innerHTML = html;
}

// trocar aba
function trocar(t){
  document.getElementById("consulta").style.display = t==="consulta"?"block":"none";
  document.getElementById("gerar").style.display = t==="gerar"?"block":"none";

  document.querySelectorAll(".tab").forEach(tab=>tab.classList.remove("active"));
  event.target.classList.add("active");
}

</script>

</body>
</html>
